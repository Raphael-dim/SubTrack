# Configuration XcodeGen — génère SubTrack.xcodeproj de façon reproductible.
# Installation : brew install xcodegen
# Génération   : xcodegen generate   (puis ouvrir SubTrack.xcodeproj)

name: SubTrack
options:
  bundleIdPrefix: com.subtrack
  deploymentTarget:
    iOS: "18.0"
  createIntermediateGroups: true

settings:
  base:
    SWIFT_VERSION: "6.0"
    SWIFT_STRICT_CONCURRENCY: complete
    GENERATE_INFOPLIST_FILE: true
    MARKETING_VERSION: "1.0.0"
    CURRENT_PROJECT_VERSION: "1"

targets:
  SubTrack:
    type: application
    platform: iOS
    sources:
      - path: SubTrack
    # Token Logo.dev (publishable) — voir Config/Secrets.xcconfig.
    configFiles:
      Debug: Config/Secrets.xcconfig
      Release: Config/Secrets.xcconfig
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.subtrack.app
        INFOPLIST_KEY_UILaunchScreen_Generation: true
        INFOPLIST_KEY_UISupportedInterfaceOrientations: UIInterfaceOrientationPortrait
        TARGETED_DEVICE_FAMILY: "1" # iPhone
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        # Info.plist partiel (clé LOGODEV_TOKEN) fusionné avec celui généré.
        INFOPLIST_FILE: SubTrack/Info.plist
